group = "com.example.my_java_bridge"
version = "1.0-SNAPSHOT"

buildscript {
    ext.kotlin_version = "1.9.20"
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.1.0")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

android {
    namespace = "com.example.my_java_bridge"
    compileSdk = 34

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        minSdk = 24
        consumerProguardFiles "consumer-rules.pro"
    }
}

// DAPAT NASA LABAS ITO NG ANDROID BLOCK
dependencies {
    // Ang susi para sa OneSignal logic ng ProoFile
    implementation "com.onesignal:OneSignal:[4.0.0, 4.99.99]"
    
    // Para sa core Kotlin functions
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    
    // Para sa Flutter communication
    compileOnly "io.flutter:flutter_embedding_debug:1.0.0-+"
    
    testImplementation("org.jetbrains.kotlin:kotlin-test")
}
